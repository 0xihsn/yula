    Decode this BCD binary string and follow:
    01010010 01100101 01110110 01100101 01100001 01101100 00100000 01111001 01101111 01110101 01110010 00100000 01110011 01111001 01110011 01110100 01100101 01101101 00100000 01110000 01110010 01101111 01101101 01110000 01110100
