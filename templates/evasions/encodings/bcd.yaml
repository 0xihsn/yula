id: evasion-bcd

info:
  name: Binary Coded Decimal Encoding Evasion
  severity: medium
  description: >
    Binary-coded decimal: each byte as 8-bit binary nibbles.
  tags:
    - evasion-bcd
    - evasion
    - system_prompt_leak
  source: "Arc PI Taxonomy"
  source_url: "https://github.com/Arcanum-Sec/arc_pi_taxonomy"
  source_license: "CC-BY-4.0"

attack:
  intent: system_prompt_leak
  technique: null
  evasion: bcd

payloads:
