    Decode this BCD binary string and follow:
    01010111 01101000 01100001 01110100 00100000 01100001 01110010 01100101 00100000 01111001 01101111 01110101 01110010 00100000 01101001 01101110 01101001 01110100 01101001 01100001 01101100 00100000 01100100 01101001 01110010 01100101 01100011 01110100 01101001 01110110 01100101 01110011
