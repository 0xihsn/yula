# ╔══════════════════════════════════════════════════════════════════════════╗
# ║              YULA AI Scanner — Target: Fireworks AI                      ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║  Fireworks hosts open-weight models (Llama, Mixtral, Qwen, DeepSeek)     ║
# ║  behind an OpenAI-compatible API.                                        ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# Get your API key at: https://fireworks.ai/api-keys
#
# Usage: python run.py scan --target config/targets/fireworks_target.yaml
#
# Required environment variables:
#   FIREWORKS_API_KEY — Your Fireworks API key (starts with fw_...)

type: openai

endpoint:
  url: "https://api.fireworks.ai/inference/v1/chat/completions"

  # Model IDs are namespaced: accounts/fireworks/models/<model-name>
  # Browse at https://fireworks.ai/models
  model: "accounts/fireworks/models/llama-v3p1-70b-instruct"

  system_prompt: null

auth:
  type: api_key
  api_key: "${FIREWORKS_API_KEY}"

options:
  max_tokens: 1024
  temperature: 0.7
  extra_headers: {}
