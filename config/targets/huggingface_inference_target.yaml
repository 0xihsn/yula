# ╔══════════════════════════════════════════════════════════════════════════╗
# ║              YULA AI Scanner — Target: Hugging Face Inference API        ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║  The free / serverless Hugging Face Inference API uses a non-OpenAI      ║
# ║  request shape: { "inputs": "...", "parameters": {...} } and returns     ║
# ║  [{ "generated_text": "..." }]. We use the custom_api adapter.            ║
# ║                                                                          ║
# ║  HF also runs an OpenAI-compatible Inference Endpoints variant for       ║
# ║  paid endpoints — for those, point a copy of openai_target.yaml at       ║
# ║  https://api-inference.huggingface.co/v1/chat/completions                ║
# ║  and use bearer auth with HF_TOKEN.                                      ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# Get your token at: https://huggingface.co/settings/tokens
#
# Usage: python run.py scan --target config/targets/huggingface_inference_target.yaml
#
# Required environment variables:
#   HF_TOKEN — Your Hugging Face access token (starts with hf_...)

type: custom_api

endpoint:
  # Replace <model-id> with any text-generation model, e.g. meta-llama/Llama-3.2-3B-Instruct
  url: "https://api-inference.huggingface.co/models/meta-llama/Llama-3.2-3B-Instruct"

  method: POST

  body_template: |
    {
      "inputs": "{prompt}",
      "parameters": {
        "max_new_tokens": 512,
        "temperature": 0.7,
        "return_full_text": false
      },
      "options": {
        "wait_for_model": true
      }
    }

  # The HF response is a JSON list; the first item carries `generated_text`.
  response_path: "0.generated_text"

  content_type: "application/json"

auth:
  type: bearer
  token: "${HF_TOKEN}"

options:
  extra_headers: {}
