# ╔══════════════════════════════════════════════════════════════════════════╗
# ║              YULA AI Scanner — Target: SambaNova Cloud                   ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║  SambaNova Cloud serves open-weight models (Llama, Qwen, DeepSeek)       ║
# ║  through an OpenAI-compatible API.                                       ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# Get your API key at: https://cloud.sambanova.ai
#
# Usage: python run.py scan --target config/targets/sambanova_target.yaml
#
# Required environment variables:
#   SAMBANOVA_API_KEY — Your SambaNova Cloud API key

type: openai

endpoint:
  url: "https://api.sambanova.ai/v1/chat/completions"

  # See https://docs.sambanova.ai for the current model list.
  # Examples: Meta-Llama-3.3-70B-Instruct, Llama-3.1-405B-Instruct,
  #           Qwen2.5-72B-Instruct, DeepSeek-R1-Distill-Llama-70B
  model: "Meta-Llama-3.3-70B-Instruct"

  system_prompt: null

auth:
  type: api_key
  api_key: "${SAMBANOVA_API_KEY}"

options:
  max_tokens: 1024
  temperature: 0.7
  extra_headers: {}
